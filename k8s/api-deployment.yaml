apiVersion: apps/v1
kind: Deployment
metadata:
  name: leiaqa-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: leiaqa-api

  template:
    metadata:
      labels:
        app: leiaqa-api

    spec:
      containers:
      - name: api
        image: eslamelshamy/leiaqa-api
        ports:
        - containerPort: 7049
